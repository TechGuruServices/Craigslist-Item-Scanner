services:
  - type: web
    name: craigslist-item-scanner
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 5000
      - key: NODE_VERSION
        value: 20.18.0
      - key: OLLAMA_URL
        sync: false
      - key: OLLAMA_MODEL
        sync: false
      - key: CHECK_INTERVAL_MINUTES
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
